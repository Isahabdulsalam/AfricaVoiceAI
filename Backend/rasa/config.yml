language: "ha"

pipeline:
- name: "WhitespaceTokenizer"
- name: "RegexFeature"
- name: "LexicalSyntacticFeauturizer"
- name: "CountVectorsFeauturizer"
- name: "DIETClassifier"
  epochs: 100
- name: "EntitySynonymMapper"
- name: "ResponseSelector"
  epochs: 100
- name: "FallbackClassifier"
  threshold: 0.3
  ambiguity_threshold: 0.1

policies:
- name: "MemorizationPolicy"
- name: "TEDPolicy"
  max_history: 5
  epochs: 100
- name: "RulePolicy"
- name: "FallbackPolicy"
  fallback_action_name: "action_default_fallback"
  core_threshold: 0.3
  nlu_threshold: 0.3